<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>براق الفضاء للإنتـرنت الاسلكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #060614 url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=1000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 30%, rgba(106, 90, 205, 0.25) 0%, rgba(6, 6, 20, 0.9) 100%);
            z-index: 0;
        }

        /* حاوية الهاتف */
        .phone-wrapper {
            width: 100%;
            max-width: 410px;
            background: linear-gradient(180deg, rgba(20, 24, 61, 0.7) 0%, rgba(10, 11, 30, 0.95) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 40px;
            padding: 30px 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(255, 215, 0, 0.05);
            z-index: 1;
            position: relative;
            text-align: center;
        }

        /* اللوجو الفضائي */
        .logo-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 15px auto;
        }

        .logo-circle {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(16, 18, 58, 0.95) 0%, rgba(33, 38, 91, 0.85) 100%);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.6), inset 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .logo-ring {
            position: absolute;
            top: 50%; left: 50%;
            width: 160px;
            height: 55px;
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            pointer-events: none;
        }

        .logo-circle img {
            width: 70px;
            height: 70px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.8));
            margin-top: 10px;
        }

        .logo-circle .brand-name {
            font-size: 1.1rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.8);
            margin-top: -5px;
        }

        h1 {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #a4a9cf;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        /* صندوق تسجيل الدخول */
        .login-card {
            background: rgba(14, 16, 46, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            padding: 22px 18px;
            margin-bottom: 25px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 25px 14px 50px;
            background: rgba(10, 11, 32, 0.8);
            border: 2px solid rgba(212, 175, 55, 0.4);
            border-radius: 50px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            text-align: right;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .input-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #ffd700;
            font-size: 1.1rem;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #aa7c11, #f3e5ab, #aa7c11);
            background-size: 200% auto;
            border: none;
            border-radius: 50px;
            color: #050512;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
            transition: 0.4s;
        }

        .login-btn:hover {
            background-position: right center;
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.5);
        }

        /* منطقة الأزرار الرئيسية الثلاثية */
        .features-row {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
        }

        .feature-bubble {
            flex: 1;
            aspect-ratio: 1 / 1;
            max-width: 90px;
            background: radial-gradient(circle at 30% 30%, rgba(40, 47, 107, 0.7) 0%, rgba(12, 14, 43, 0.95) 100%);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
        }

        .feature-bubble:active, .feature-bubble.active {
            transform: scale(0.95);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .feature-bubble i { font-size: 1.4rem; color: #ffd700; margin-bottom: 4px; }
        .feature-bubble span { color: #ffffff; font-size: 0.8rem; font-weight: 700; }

        /* حاوية الانبثاق الذكية والفقاعات المتطايرة */
        .popout-container {
            position: absolute;
            top: -120px; /* تظهر فوق الأزرار مباشرة */
            left: 0;
            width: 100%;
            height: 120px;
            pointer-events: none;
            z-index: 3;
        }

        /* كود الفقاعة الممتدة المنبثقة بشكل سحري */
        .sub-bubble {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, rgba(147, 112, 219, 0.9) 0%, rgba(25, 20, 70, 0.95) 100%);
            border: 1.5px solid #ffd700;
            color: #fff;
            border-radius: 50px;
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), 0 0 10px rgba(147, 112, 219, 0.5);
            pointer-events: auto;
            opacity: 0;
            transform: scale(0) translateY(50px);
            animation: bubblePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        .sub-bubble i {
            color: #ffd700;
            font-size: 0.85rem;
        }

        @keyframes bubblePop {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* أنيميشن الاختفاء اللطيف عند التبديل */
        @keyframes bubbleFadeOut {
            to {
                opacity: 0;
                transform: scale(0) translateY(-20px);
            }
        }

        .customer-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            color: #8c92bd;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .customer-footer span { color: #ffd700; font-weight: 900; }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        
        <div class="logo-container">
            <div class="logo-ring"></div>
            <div class="logo-circle">
                <i class="fa-solid fa-wifi" style="color: #00ffff; font-size: 1.1rem; position: absolute; top: 12px; filter: drop-shadow(0 0 5px #00ffff);"></i>
                <img src="https://img.icons8.com/neon/96/unicorn.png" alt="Buraq Space">
                <div class="brand-name">buraq</div>
            </div>
        </div>

        <h1>براق الفضاء للإنترنت اللاسلكي</h1>
        <p class="subtitle">أهلاً بك في شبكتنا</p>

        <form class="login-card" action="$(link-login-only)" method="post">
            <input type="hidden" name="dst" value="$(link-orig)" />
            <input type="hidden" name="popup" value="true" />
            
            <div class="input-wrapper">
                <input type="text" name="username" placeholder="أدخل اسم المستخدم" required autocomplete="off">
                <i class="fa-solid fa-user"></i>
            </div>

            <div class="input-wrapper">
                <input type="password" name="password" placeholder="أدخل كلمة المرور" required>
                <i class="fa-solid fa-lock"></i>
            </div>

            <button type="submit" class="login-btn">
                <span>تسجيل الدخول</span>
                <i class="fa-solid fa-arrow-left"></i>
            </button>
        </form>

        <div class="features-row">
            
            <div class="popout-container" id="bubbleContainer"></div>
            
            <div class="feature-bubble" onclick="showSubBubbles('prices', this)">
                <i class="fa-solid fa-tag"></i>
                <span>الأسعار</span>
            </div>

            <div class="feature-bubble" onclick="showSubBubbles('points', this)">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>نقاط البيع</span>
            </div>

            <div class="feature-bubble" onclick="showSubBubbles('branches', this)">
                <i class="fa-solid fa-location-dot"></i>
                <span>الفروع</span>
            </div>

        </div>

        <div class="customer-footer">
            <i class="fa-solid fa-headset" style="color: #ffd700;"></i>
            خدمة العملاء: <span>10000000</span>
        </div>

    </div>

    <script>
        // قاعدة بيانات الفقاعات المنبثقة لكل زر
        const dataBubbles = {
            branches: [
                { text: 'فرع بغداد', icon: 'fa-location-dot', top: '15px', right: '15%' },
                { text: 'فرع البصرة', icon: 'fa-location-dot', top: '65px', right: '5%' },
                { text: 'فرع النجف', icon: 'fa-location-dot', top: '10px', left: '35%' },
                { text: 'فرع أربيل', icon: 'fa-location-dot', top: '55px', left: '10%' }
            ],
            points: [
                { text: 'كشك المطار', icon: 'fa-shop', top: '20px', right: '20%' },
                { text: 'مكتبة الفجر', icon: 'fa-book', top: '70px', right: '40%' },
                { text: 'سوبرماركت 105', icon: 'fa-basket-shopping', top: '10px', left: '25%' },
                { text: 'مكتبة الغدير', icon: 'fa-book', top: '65px', left: '10%' }
            ],
            prices: [
                { text: '5$ | 7 أيام', icon: 'fa-bolt', top: '15px', right: '25%' },
                { text: '10$ | 30 يوم', icon: 'fa-star', top: '60px', right: '15%' },
                { text: '20$ | VIP مفتوح', icon: 'fa-crown', top: '35px', left: '15%' }
            ]
        };

        let currentActiveType = null;

        function showSubBubbles(type, element) {
            const container = document.getElementById('bubbleContainer');
            
            // إزالة الأزرار النشطة القديمة
            document.querySelectorAll('.feature-bubble').forEach(b => b.classList.remove('active'));
            
            // إذا ضغط المستخدم على نفس الزر المفتوح حالياً، يتم إغلاقه
            if (currentActiveType === type) {
                clearBubbles();
                currentActiveType = null;
                return;
            }

            // تفعيل الزر الحالي ومظهر الضغطة
            element.classList.add('active');
            currentActiveType = type;
            
            // تفريغ الحاوية أولاً مع تأثير خروج ناعم
            clearBubbles();

            // توليد الفقاعات الجديدة بناءً على البيانات والموضع الفضائي
            dataBubbles[type].forEach((item, index) => {
                setTimeout(() => {
                    const bubble = document.createElement('div');
                    bubble.className = 'sub-bubble';
                    bubble.innerHTML = `<i class="fa-solid ${item.icon}"></i> ${item.text}`;
                    
                    // تطبيق الإحداثيات المخصصة لتبدو متناثرة بشكل رائع
                    if(item.top) bubble.style.top = item.top;
                    if(item.bottom) bubble.style.bottom = item.bottom;
                    if(item.left) bubble.style.left = item.left;
                    if(item.right) bubble.style.right = item.right;

                    container.appendChild(bubble);
                }, index * 80); // مباعدة زمنية بسيطة تعطي شعور الانبثاق المتتالي الاحترافي
            });
        }

        function clearBubbles() {
            const container = document.getElementById('bubbleContainer');
            const oldBubbles = container.querySelectorAll('.sub-bubble');
            oldBubbles.forEach(b => {
                b.style.animation = 'bubbleFadeOut 0.3s ease forwards';
                setTimeout(() => b.remove(), 300);
            });
        }
    </script>
</body>
</html>
