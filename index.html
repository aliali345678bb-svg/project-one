<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>براق الفضاء للإنتـرنت الاسلكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #050515;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow: hidden;
            position: relative;
        }

        /* خلفية فضاء ديناميكية متحركة بالكامل */
        .space-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(88, 57, 212, 0.2) 0%, rgba(5, 5, 20, 1) 80%);
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.6;
            animation: floatStars 20s linear infinite;
        }

        @keyframes floatStars {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* الحاوية الرئيسية للموبايل بتأثير زجاجي مطور */
        .phone-wrapper {
            width: 100%;
            max-width: 410px;
            background: linear-gradient(180deg, rgba(22, 26, 66, 0.75) 0%, rgba(10, 11, 32, 0.96) 100%);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 2px solid rgba(255, 215, 0, 0.25);
            border-radius: 40px;
            padding: 30px 20px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9), 
                        0 0 40px rgba(138, 43, 226, 0.25);
            z-index: 1;
            position: relative;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* اللوجو الدائري المشع مع أنيميشن الدوران الخفيف للرينج */
        .logo-container {
            position: relative;
            width: 135px;
            height: 135px;
            margin: 0 auto 15px auto;
        }

        .logo-circle {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(16, 18, 58, 0.95) 0%, rgba(33, 38, 91, 0.9) 100%);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 35px rgba(138, 43, 226, 0.7), inset 0 0 20px rgba(0, 255, 255, 0.2);
            transition: all 0.5s ease;
        }

        .logo-ring {
            position: absolute;
            top: 50%; left: 50%;
            width: 155px;
            height: 52px;
            border: 2px solid rgba(255, 215, 0, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            pointer-events: none;
            animation: orbit 8s linear infinite;
        }

        @keyframes orbit {
            0% { transform: translate(-50%, -50%) rotate(-15deg); }
            100% { transform: translate(-50%, -50%) rotate(345deg); }
        }

        .logo-circle img {
            width: 65px;
            height: 65px;
            filter: drop-shadow(0 0 12px rgba(0, 255, 255, 0.9));
        }

        .logo-circle .brand-name {
            font-size: 1.1rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.8);
            margin-top: -3px;
        }

        h1 {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .subtitle {
            color: #a4a9cf;
            font-size: 0.95rem;
            margin-bottom: 25px;
            transition: 0.3s;
        }

        /* تأثيرات الأنميشن لتبديل النوافذ وسحب الكروت */
        .window-pane {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: scale(1);
        }

        .window-pane.hide {
            opacity: 0;
            transform: scale(0.8) translateY(-30px);
            display: none !important;
        }

        .window-pane.show {
            animation: paneReveal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.25) forwards;
        }

        @keyframes paneReveal {
            from { opacity: 0; transform: scale(0.8) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* صندوق مدخلات تسجيل الدخول والأنيميشن الحركي للفوكس */
        .login-card {
            background: rgba(14, 16, 46, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            padding: 25px 20px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.01);
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px 25px 15px 50px;
            background: rgba(8, 9, 26, 0.85);
            border: 2px solid rgba(212, 175, 55, 0.35);
            border-radius: 50px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            text-align: right;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-wrapper input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            background: rgba(18, 20, 56, 0.95);
            transform: scale(1.02);
        }

        .input-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #ffd700;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .input-wrapper input:focus + i {
            transform: translateY(-50%) scale(1.2);
            color: #fff;
            filter: drop-shadow(0 0 5px #ffd700);
        }

        /* زر تسجيل الدخول */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #aa7c11, #f3e5ab, #aa7c11);
            background-size: 200% auto;
            border: none;
            border-radius: 50px;
            color: #050512;
            font-size: 1.15rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.35);
            transition: all 0.3s;
        }

        .login-btn:hover {
            background-position: right center;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.6);
            transform: translateY(-2px);
        }

        /* ------------------------------------------- */
        /* شاشة نجاح الاتصال المذهلة (تطابق الصورة الثانية) */
        /* ------------------------------------------- */
        .success-card {
            background: rgba(14, 16, 46, 0.7);
            border: 1.5px solid rgba(0, 255, 200, 0.25);
            border-radius: 25px;
            padding: 25px 20px;
            margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.1);
        }

        .success-icon-glow {
            width: 70px;
            height: 70px;
            background: #00ffc8;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px #00ffc8;
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .success-icon-glow i {
            color: #050515;
            font-size: 2rem;
        }

        .success-title {
            color: #00ffc8 !important;
            font-size: 1.4rem !important;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0,255,200,0.3);
        }

        /* تفاصيل رصيد وسرعة الكرت */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .info-row:last-child { border: none; }

        .info-label {
            color: #8c92bd;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-label i { color: #00ffc8; }

        .info-value {
            color: #ffffff;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .info-value.highlight { color: #00ffc8; }

        /* ------------------------------------------- */
        /* منطقة الأزرار الدائرية التفاعلية */
        /* ------------------------------------------- */
        .features-row {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
        }

        .feature-bubble {
            flex: 1;
            aspect-ratio: 1 / 1;
            max-width: 90px;
            background: radial-gradient(circle at 30% 30%, rgba(40, 47, 107, 0.7) 0%, rgba(12, 14, 43, 0.95) 100%);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            z-index: 2;
        }

        .feature-bubble:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: #ffd700;
            box-shadow: 0 12px 25px rgba(138, 43, 226, 0.5);
        }

        .feature-bubble.active {
            border-color: #ffd700;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
            transform: scale(0.95);
        }

        .feature-bubble i { font-size: 1.4rem; color: #ffd700; margin-bottom: 4px; }
        .feature-bubble span { color: #ffffff; font-size: 0.8rem; font-weight: 700; }

        /* حاوية الانبثاق المتطايرة العلوية */
        .popout-container {
            position: absolute;
            top: -125px;
            left: 0;
            width: 100%;
            height: 120px;
            pointer-events: none;
            z-index: 3;
        }

        .sub-bubble {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, rgba(147, 112, 219, 0.95) 0%, rgba(25, 20, 70, 0.98) 100%);
            border: 1.5px solid #ffd700;
            color: #fff;
            border-radius: 50px;
            padding: 7px 15px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6), 0 0 15px rgba(147, 112, 219, 0.4);
            pointer-events: auto;
            opacity: 0;
            transform: scale(0) translateY(40px);
            animation: bubblePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.25) forwards;
        }

        @keyframes bubblePop {
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes bubbleFadeOut {
            to { opacity: 0; transform: scale(0) translateY(-20px); }
        }

        .customer-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            color: #8c92bd;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .customer-footer span { color: #ffd700; font-weight: 900; }
    </style>
</head>
<body>

    <div class="space-bg" id="spaceBg"></div>

    <div class="phone-wrapper" id="mainWrapper">
        
        <div class="logo-container">
            <div class="logo-ring"></div>
            <div class="logo-circle" id="logoCircle">
                <i class="fa-solid fa-wifi" style="color: #00ffff; font-size: 1.1rem; position: absolute; top: 12px; filter: drop-shadow(0 0 5px #00ffff);"></i>
                <img src="https://img.icons8.com/neon/96/unicorn.png" alt="Buraq Space">
                <div class="brand-name">buraq</div>
            </div>
        </div>

        <h1 id="mainTitle">براق الفضاء للإنترنت اللاسلكي</h1>
        <p class="subtitle" id="mainSub">أهلاً بك في شبكتنا</p>

        <div id="loginPane" class="window-pane">
            <form class="login-card" onsubmit="handleLogin(event)">
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="أدخل رقم الكرت / اسم المستخدم" required autocomplete="off">
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="أدخل كلمة المرور (إن وجدت)">
                    <i class="fa-solid fa-lock"></i>
                </div>

                <button type="submit" class="login-btn">
                    <span>الاتصال بالشبكة</span>
                    <i class="fa-solid fa-bolt"></i>
                </button>
            </form>
        </div>

        <div id="successPane" class="window-pane hide">
            <div class="success-card">
                <div class="success-icon-glow">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h2 class="success-title">تم تفعيل الحساب بنجاح</h2>
                
                <div class="info-row">
                    <div class="info-label"><i class="fa-solid fa-gauge-high"></i> سرعة التحميل</div>
                    <div class="info-value highlight">50 ميجابت/ث</div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fa-solid fa-database"></i> الرصيد المتبقي</div>
                    <div class="info-value highlight">∞ مفتوح</div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fa-solid fa-calendar-days"></i> انتهاء الصلاحية</div>
                    <div class="info-value">غير محدود</div>
                </div>
            </div>
        </div>

        <div class="features-row">
            <div class="popout-container" id="bubbleContainer"></div>
            
            <div class="feature-bubble" onclick="showSubBubbles('prices', this)">
                <i class="fa-solid fa-tag"></i>
                <span>الأسعار</span>
            </div>

            <div class="feature-bubble" onclick="showSubBubbles('points', this)">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>نقاط البيع</span>
            </div>

            <div class="feature-bubble" onclick="showSubBubbles('branches', this)">
                <i class="fa-solid fa-location-dot"></i>
                <span>الفروع</span>
            </div>
        </div>

        <div class="customer-footer">
            <i class="fa-solid fa-headset" style="color: #ffd700;"></i>
            خدمة العملاء: <span>10000000</span>
        </div>

    </div>

    <script>
        // توليد نجوم الخلفية الفضائية المتحركة بشكل عشوائي عند التحميل لعدم ثقل الكود
        const bg = document.getElementById('spaceBg');
        for (let i = 0; i < 40; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random() * 3 + 1 + 'px';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDelay = Math.random() * 15 + 's';
            bg.appendChild(star);
        }

        // داتا الانبثاق للأزرار الثلاثة
        const dataBubbles = {
            branches: [
                { text: 'فرع بغداد', icon: 'fa-location-dot', top: '15px', right: '15%' },
                { text: 'فرع البصرة', icon: 'fa-location-dot', top: '65px', right: '5%' },
                { text: 'فرع النجف', icon: 'fa-location-dot', top: '10px', left: '35%' },
                { text: 'فرع أربيل', icon: 'fa-location-dot', top: '55px', left: '10%' }
            ],
            points: [
                { text: 'كشك المطار', icon: 'fa-shop', top: '20px', right: '20%' },
                { text: 'مكتبة الفجر', icon: 'fa-book', top: '70px', right: '40%' },
                { text: 'سوبرماركت 105', icon: 'fa-basket-shopping', top: '10px', left: '25%' },
                { text: 'مكتبة الغدير', icon: 'fa-book', top: '65px', left: '10%' }
            ],
            prices: [
                { text: '5$ | 7 أيام', icon: 'fa-bolt', top: '15px', right: '25%' },
                { text: '10$ | 30 يوم', icon: 'fa-star', top: '60px', right: '15%' },
                { text: '20$ | VIP مفتوح', icon: 'fa-crown', top: '35px', left: '15%' }
            ]
        };

        let currentActiveType = null;

        function showSubBubbles(type, element) {
            const container = document.getElementById('bubbleContainer');
            document.querySelectorAll('.feature-bubble').forEach(b => b.classList.remove('active'));
            
            if (currentActiveType === type) {
                clearBubbles();
                currentActiveType = null;
                return;
            }

            element.classList.add('active');
            currentActiveType = type;
            clearBubbles();

            dataBubbles[type].forEach((item, index) => {
                setTimeout(() => {
                    const bubble = document.createElement('div');
                    bubble.className = 'sub-bubble';
                    bubble.innerHTML = `<i class="fa-solid ${item.icon}"></i> ${item.text}`;
                    if(item.top) bubble.style.top = item.top;
                    if(item.left) bubble.style.left = item.left;
                    if(item.right) bubble.style.right = item.right;
                    container.appendChild(bubble);
                }, index * 60);
            });
        }

        function clearBubbles() {
            const container = document.getElementById('bubbleContainer');
            container.querySelectorAll('.sub-bubble').forEach(b => {
                b.style.animation = 'bubbleFadeOut 0.25s ease forwards';
                setTimeout(() => b.remove(), 250);
            });
        }

        // دالة التعامل السلس مع محاكي تسجيل الدخول الناجح والتحول لشاشة الكرت النشط
        function handleLogin(event) {
            event.preventDefault(); // منع إعادة تحميل الصفحة فوراً لرؤية الأنيميشن
            
            const loginPane = document.getElementById('loginPane');
            const successPane = document.getElementById('successPane');
            const logoCircle = document.getElementById('logoCircle');
            
            // 1. إخفاء صندوق تسجيل الدخول بأنيميشن تدرجي ناعم
            loginPane.classList.add('hide');
            
            setTimeout(() => {
                // 2. تعديل هالة اللوجو لتتحول للأخضر النيوني (دلالة على الاتصال بنجاح)
                logoCircle.style.boxShadow = '0 0 40px #00ffc8, inset 0 0 20px rgba(0, 255, 200, 0.3)';
                logoCircle.style.borderColor = '#00ffc8';
                
                // 3. إظهار شاشة نجاح الحساب وتفاصيل الرصيد والإنترنت النشط
                successPane.classList.remove('hide');
                successPane.classList.add('show');
                
                // إغلاق أي فقاعات فروع أو أسعار مفتوحة لتنسيق الصفحة
                clearBubbles();
                document.querySelectorAll('.feature-bubble').forEach(b => b.classList.remove('active'));
                currentActiveType = null;
            }, 400);
        }
    </script>
</body>
</html>
